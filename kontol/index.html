
  <!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>UJIKOMPETENSIMILIKKOKO</title>
      <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
          font-family: Arial, Helvetica, sans-serif;
        }

        body {
          background: linear-gradient(270deg, #06171f, #2d4b55);
          color: #e5e7eb;
        }
        .dashboard {
          max-width: 400px;
          margin: auto;
          padding: 30px;
        }

        .dashboard h1 {
          text-align: center;
          margin-bottom: 30px;
          font-size: 28px;
          letter-spacing: 1px;
        }

        .card {
          background: #020617;
          border-radius: 14px;
          padding: 20px;
          margin-bottom: 25px;
          box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .card h3 {
          margin-bottom: 15px;
          font-size: 20px;
          border-left: 5px solid #38bdf8;
          padding-left: 10px;
        }

        .divbtn {
          display: flex;
          justify-content: space-between;
          align-items: center;
          background: #00041d;
          border: 1px solid #1e293b;
          border-radius: 10px;
          padding: 12px 16px;
          margin-bottom: 20px;
          box-shadow: 0 0 0 transparent;
        }

        .divbtn p {
          margin: 10px;
          font-size: 15px;
        }

        button {
          padding: 8px 16px;
          border: none;
          border-radius: 8px;
          cursor: pointer;
          font-weight: bold;
          transition: 0.5s;
          width: 100px;
        }
        button:hover {
          box-shadow: 0px 3px 1px rgba(0,0,0,1);
        }
        button:active{
          box-shadow: 0 0 0 rgba(0,0,0,0);
          transform: translate(0px, 3px);
        }
        button.ON{
          background-color: var(--btncolor);
          box-shadow: 0px 0px 10px var(--btncolor);
        }

      </style>
  </head>
  <body>
  <div class="dashboard">
    <h1>DASHBOARBby KOKO XII K2</h1>
    <div class="card">

        <h3>LED CONTROL</h3>

        <div class="divbtn" id="led-merah">
          <p>LED Merah :</p>
          <button id="btn-merah">-</button>
        </div>

        <div class="divbtn" id="led-hijau">
          <p>LED Hijau :</p>
          <button id="btn-hijau">-</button>
        </div>

        <div class="divbtn" id="led-biru">
          <p>LED Biru :</p>
          <button id="btn-biru">-</button>
        </div>
    </div>
    <div class="card">
      <h3>OTHER DATA</h3>

        <div class="divbtn">
          <p>Servo :</p>
          <button id="servo">-</button>
        </div>

        <div class="divbtn">
          <p>Jarak :</p>
          <p id="jarak"></p>
        </div>

      </div>

  </div>
  <script type="module">
    // Import the functions you need from the SDKs you need
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, set, ref, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";        // TODO: Add SDKs for Firebase products that you want to use
    // https://firebase.google.com/docs/web/setup#available-libraries

    // Your web app's Firebase configuration
    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
    const firebaseConfig = {
        apiKey: "AIzaSyAktTvw88nDFsVV1ATg2Nl7Umbvq9yyxMk",
        authDomain: "ukk-250201011602392.firebaseapp.com",
        databaseURL: "https://ukk-250201011602392-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ukk-250201011602392",
        storageBucket: "ukk-250201011602392.firebasestorage.app",
        messagingSenderId: "291382383718",
        appId: "1:291382383718:web:7f5326b9fae89729ecc9a7",
        measurementId: "G-JHB8ND07FH"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    var DataLED = {};
    var DataServo = {};
    onValue(ref(db, "LED"), (snapshot) => {
      const data = snapshot.val();
      if (!data) return;
      DataLED = data;

      LEDUI("merah", data.merah);
      LEDUI("hijau", data.hijau);
      LEDUI("biru", data.biru);

    });

    document.getElementById("btn-merah").addEventListener("click", ()=>{
      set(ref(db,"LED/merah"), DataLED.merah === 0 ? 1 : 0);
    });
    document.getElementById("btn-hijau").addEventListener("click", ()=>{
      set(ref(db,"LED/hijau"), DataLED.hijau === 0 ? 1 : 0);
    });
    document.getElementById("btn-biru").addEventListener("click", ()=>{
      set(ref(db,"LED/biru"), DataLED.biru === 0 ? 1 : 0);
    });

    function LEDUI(warna, kondisi){
      const btn = document.getElementById("btn-"+ warna);
      const listwarna = {
        merah: "red",
        hijau: "green",
        biru: "blue"
      };
      btn.style.setProperty("--btncolor", listwarna[warna]);
      btn.textContent = kondisi ? "NYALA" : "MATI";
      kondisi ? btn.classList.add("ON") : btn.classList.remove("ON");
    }

    onValue(ref(db, "servo"), (snapshot) => {
      const data = snapshot.val();
      if (!data) return;
      DataServo = data;

      document.getElementById("servo").textContent = data.servo === 0 ? "TERTUTUP" : "TERBUKA";

    });

    document.getElementById("servo").addEventListener("click", ()=>{
      set(ref(db, "servo/servo"), DataServo.servo === 0 ? 180 : 0);
    });

    onValue(ref(db, "jarak"), (snapshot)=>{
      const data = snapshot.val();
      if(!data) return;
      document.getElementById("jarak").textContent = data.jarak + " CM";
    });
  </script>
  </body>
  </html>
